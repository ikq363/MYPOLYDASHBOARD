<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jadual Perancangan - MYPOLY</title>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-analytics.js";
        import { getAuth, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, onSnapshot, collection, addDoc, getDocs, query, where, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyAcTdgGAEPnUEP87N_BuLBxBmSzo1NOVHY",
            authDomain: "mypoly-dashboard.firebaseapp.com",
            projectId: "mypoly-dashboard",
            storageBucket: "mypoly-dashboard.firebasestorage.app",
            messagingSenderId: "829710608275",
            appId: "1:829710608275:web:f2c68b3c6b181cfc256a66",
            measurementId: "G-HTZXCGB1ZB"
        };

        // Initialize
        const app = initializeApp(firebaseConfig);
        const analytics = getAnalytics(app);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const ALLOWED_EMAIL = "ikqram363@gmail.com";

        // ===== DOM ELEMENTS =====
        const userName = document.getElementById('userName');
        const logoutBtn = document.getElementById('logoutBtn');

        // Jadual Kelas (Berulang)
        const classGrid = document.getElementById('classGrid');
        const classModal = document.getElementById('classModal');
        const classForm = document.getElementById('classForm');
        const classModalTitle = document.getElementById('classModalTitle');
        const classDay = document.getElementById('classDay');
        const classTime = document.getElementById('classTime');
        const classSubject = document.getElementById('classSubject');
        const classCode = document.getElementById('classCode');
        const classLecturer = document.getElementById('classLecturer');
        const classRoom = document.getElementById('classRoom');
        const classColor = document.getElementById('classColor');
        const classNotif = document.getElementById('classNotif');
        const classClose = document.getElementById('classClose');
        const classCancel = document.getElementById('classCancel');
        const classDelete = document.getElementById('classDelete');
        const classSubmit = document.getElementById('classSubmit');

        // Jadual Perancangan (Dengan Tarikh)
        const scheduleGrid = document.getElementById('scheduleGrid');
        const scheduleModal = document.getElementById('scheduleModal');
        const scheduleForm = document.getElementById('scheduleForm');
        const scheduleModalTitle = document.getElementById('scheduleModalTitle');
        const scheduleDay = document.getElementById('scheduleDay');
        const scheduleDate = document.getElementById('scheduleDate');
        const scheduleTime = document.getElementById('scheduleTime');
        const scheduleSubject = document.getElementById('scheduleSubject');
        const scheduleCode = document.getElementById('scheduleCode');
        const scheduleLecturer = document.getElementById('scheduleLecturer');
        const scheduleRoom = document.getElementById('scheduleRoom');
        const scheduleColor = document.getElementById('scheduleColor');
        const scheduleNotif = document.getElementById('scheduleNotif');
        const scheduleClose = document.getElementById('scheduleClose');
        const scheduleCancel = document.getElementById('scheduleCancel');
        const scheduleDelete = document.getElementById('scheduleDelete');
        const scheduleSubmit = document.getElementById('scheduleSubmit');

        const currentWeekDisplay = document.getElementById('currentWeekDisplay');
        const prevWeekBtn = document.getElementById('prevWeekBtn');
        const nextWeekBtn = document.getElementById('nextWeekBtn');
        const weekRange = document.getElementById('weekRange');
        const addClassBtn = document.getElementById('addClassBtn');
        const addScheduleBtn = document.getElementById('addScheduleBtn');

        // ===== STATE =====
        let currentUser = null;
        let currentWeekOffset = 0;
        let editingClassId = null;
        let editingScheduleId = null;
        let classData = {};
        let scheduleData = {};

        // ===== DAYS & TIMES =====
        const weekDays = ['Isnin', 'Selasa', 'Rabu', 'Khamis', 'Jumaat'];
        const allDays = ['Isnin', 'Selasa', 'Rabu', 'Khamis', 'Jumaat', 'Sabtu', 'Ahad'];

        // Class times: 7:30 AM - 6:00 PM (30 min intervals)
        const classTimes = [];
        for (let h = 7; h < 18; h++) {
            for (let m = 0; m < 60; m += 30) {
                const hour = h < 10 ? `0${h}` : `${h}`;
                const min = m === 0 ? '00' : '30';
                classTimes.push(`${hour}:${min}`);
            }
        }

        // Schedule times: 24 hours
        const scheduleTimes = [];
        for (let h = 0; h < 24; h++) {
            for (let m = 0; m < 60; m += 30) {
                const hour = h < 10 ? `0${h}` : `${h}`;
                const min = m === 0 ? '00' : '30';
                scheduleTimes.push(`${hour}:${min}`);
            }
        }

        // ===== AUTH CHECK =====
        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.href = 'index.html';
                return;
            }
            if (user.email !== ALLOWED_EMAIL) {
                alert('Akses ditolak.');
                await signOut(auth);
                window.location.href = 'index.html';
                return;
            }
            currentUser = user;
            await loadUserProfile(user.uid);
            await loadClassData();
            await loadScheduleData();
            renderClassGrid();
            renderScheduleGrid();
            updateWeekDisplay();
        });

        // ===== LOAD USER PROFILE =====
        async function loadUserProfile(uid) {
            try {
                const userRef = doc(db, "users", uid);
                const userSnap = await getDoc(userRef);
                if (userSnap.exists()) {
                    userName.textContent = userSnap.data().displayName || 'Pengguna';
                }
            } catch (error) {
                console.error('Error loading profile:', error);
            }
        }

        // ===== LOGOUT =====
        logoutBtn.addEventListener('click', async () => {
            await signOut(auth);
            window.location.href = 'index.html';
        });

        // ===== LOAD CLASS DATA (Berulang) =====
        async function loadClassData() {
            if (!currentUser) return;
            try {
                const q = query(
                    collection(db, "classes"),
                    where("userId", "==", currentUser.uid)
                );
                const querySnapshot = await getDocs(q);
                classData = {};
                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    const key = `${data.day}-${data.time}`;
                    classData[key] = { id: doc.id, ...data };
                });
            } catch (error) {
                console.error('Error loading classes:', error);
            }
        }

        // ===== LOAD SCHEDULE DATA (Dengan Tarikh) =====
        async function loadScheduleData() {
            if (!currentUser) return;
            try {
                const q = query(
                    collection(db, "schedules"),
                    where("userId", "==", currentUser.uid)
                );
                const querySnapshot = await getDocs(q);
                scheduleData = {};
                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    const key = `${data.date}-${data.day}-${data.time}`;
                    scheduleData[key] = { id: doc.id, ...data };
                });
            } catch (error) {
                console.error('Error loading schedules:', error);
            }
        }

        // ===== GET DATE FOR DAY =====
        function getDateForDay(day, offset = 0) {
            const now = new Date();
            const currentDay = now.getDay(); // 0=Sunday, 1=Monday
            const dayMap = { 'Ahad': 0, 'Isnin': 1, 'Selasa': 2, 'Rabu': 3, 'Khamis': 4, 'Jumaat': 5, 'Sabtu': 6 };
            const targetDay = dayMap[day];
            let diff = targetDay - currentDay + (offset * 7);
            const date = new Date(now);
            date.setDate(date.getDate() + diff);
            return date;
        }

        function formatDate(date) {
            return `${date.getDate()}/${date.getMonth() + 1}/${date.getFullYear()}`;
        }

        function getWeekDates(offset = 0) {
            const now = new Date();
            const startOfWeek = new Date(now);
            startOfWeek.setDate(now.getDate() - now.getDay() + 1 + (offset * 7));
            const dates = {};
            allDays.forEach((day, index) => {
                const d = new Date(startOfWeek);
                d.setDate(startOfWeek.getDate() + index);
                dates[day] = d;
            });
            return dates;
        }

        // ===== FORMAT TIME DISPLAY =====
        function formatTimeDisplay(time) {
            const [h, m] = time.split(':');
            const hour = parseInt(h);
            if (hour === 0) return '12:00 AM';
            if (hour < 12) return `${hour}:${m} AM`;
            if (hour === 12) return `12:${m} PM`;
            return `${hour - 12}:${m} PM`;
        }

        // ===== RENDER CLASS GRID (Berulang) =====
        function renderClassGrid() {
            const grid = document.getElementById('classGrid');
            grid.innerHTML = '';

            // Header
            const headerRow = document.createElement('div');
            headerRow.className = 'grid-header';
            headerRow.innerHTML = `
                <div class="time-label">Waktu</div>
                ${weekDays.map(day => `
                    <div class="day-header" data-day="${day}">
                        <span class="day-name">${day}</span>
                    </div>
                `).join('')}
            `;
            grid.appendChild(headerRow);

            // Time rows
            classTimes.forEach(time => {
                const row = document.createElement('div');
                row.className = 'grid-row';

                const timeLabel = document.createElement('div');
                timeLabel.className = 'time-label';
                timeLabel.textContent = formatTimeDisplay(time);
                row.appendChild(timeLabel);

                weekDays.forEach(day => {
                    const cell = document.createElement('div');
                    cell.className = 'grid-cell';
                    cell.dataset.day = day;
                    cell.dataset.time = time;

                    const key = `${day}-${time}`;
                    if (classData[key]) {
                        const data = classData[key];
                        cell.innerHTML = `
                            <div class="schedule-item" style="background: ${data.color || '#667eea'};">
                                <div class="subject-code">${data.subjectCode || ''}</div>
                                <div class="subject-name">${data.subjectName}</div>
                                <div class="lecturer-name">👨‍🏫 ${data.lecturer || ''}</div>
                                <div class="room-number">🏫 ${data.room || ''}</div>
                                <button class="delete-slot" data-id="${data.id}">✕</button>
                            </div>
                        `;
                        cell.querySelector('.delete-slot').addEventListener('click', (e) => {
                            e.stopPropagation();
                            deleteClass(data.id);
                        });
                        cell.addEventListener('click', () => editClass(data.id));
                    } else {
                        cell.addEventListener('click', () => openClassModal(day, time));
                        cell.innerHTML = `<span class="add-hint">+</span>`;
                    }

                    row.appendChild(cell);
                });

                grid.appendChild(row);
            });
        }

        // ===== RENDER SCHEDULE GRID (Dengan Tarikh) =====
        function renderScheduleGrid() {
            const grid = document.getElementById('scheduleGrid');
            grid.innerHTML = '';

            const weekDates = getWeekDates(currentWeekOffset);

            // Header
            const headerRow = document.createElement('div');
            headerRow.className = 'grid-header';
            headerRow.innerHTML = `
                <div class="time-label">Waktu</div>
                ${allDays.map(day => `
                    <div class="day-header" data-day="${day}">
                        <span class="day-name">${day}</span>
                        <span class="day-date">${formatDate(weekDates[day])}</span>
                    </div>
                `).join('')}
            `;
            grid.appendChild(headerRow);

            // Time rows
            scheduleTimes.forEach(time => {
                const row = document.createElement('div');
                row.className = 'grid-row';

                const timeLabel = document.createElement('div');
                timeLabel.className = 'time-label';
                timeLabel.textContent = formatTimeDisplay(time);
                row.appendChild(timeLabel);

                allDays.forEach(day => {
                    const cell = document.createElement('div');
                    cell.className = 'grid-cell';
                    const dateStr = formatDate(weekDates[day]);
                    cell.dataset.day = day;
                    cell.dataset.time = time;
                    cell.dataset.date = dateStr;

                    const key = `${dateStr}-${day}-${time}`;
                    if (scheduleData[key]) {
                        const data = scheduleData[key];
                        cell.innerHTML = `
                            <div class="schedule-item" style="background: ${data.color || '#667eea'};">
                                <div class="subject-code">${data.subjectCode || ''}</div>
                                <div class="subject-name">${data.subjectName}</div>
                                <div class="lecturer-name">👨‍🏫 ${data.lecturer || ''}</div>
                                <div class="room-number">🏫 ${data.room || ''}</div>
                                <button class="delete-slot" data-id="${data.id}">✕</button>
                            </div>
                        `;
                        cell.querySelector('.delete-slot').addEventListener('click', (e) => {
                            e.stopPropagation();
                            deleteSchedule(data.id);
                        });
                        cell.addEventListener('click', () => editSchedule(data.id));
                    } else {
                        cell.addEventListener('click', () => openScheduleModal(day, time, weekDates[day]));
                        cell.innerHTML = `<span class="add-hint">+</span>`;
                    }

                    row.appendChild(cell);
                });

                grid.appendChild(row);
            });
        }

        // ===== CLASS CRUD =====
        function openClassModal(day, time, editData = null) {
            classDay.value = day;
            classTime.value = time;
            if (editData) {
                classModalTitle.textContent = '✏️ Edit Jadual Kelas';
                classSubject.value = editData.subjectName || '';
                classCode.value = editData.subjectCode || '';
                classLecturer.value = editData.lecturer || '';
                classRoom.value = editData.room || '';
                classColor.value = editData.color || '#667eea';
                classNotif.checked = editData.notification || false;
                editingClassId = editData.id;
                classDelete.style.display = 'inline-block';
            } else {
                classModalTitle.textContent = '➕ Tambah Jadual Kelas';
                classForm.reset();
                classColor.value = '#667eea';
                classNotif.checked = false;
                editingClassId = null;
                classDelete.style.display = 'none';
            }
            classModal.classList.add('show');
            classSubject.focus();
        }

        function editClass(id) {
            const key = Object.keys(classData).find(k => classData[k].id === id);
            if (key) {
                openClassModal(classData[key].day, classData[key].time, classData[key]);
            }
        }

        async function deleteClass(id) {
            if (!confirm('Padam jadual kelas ini?')) return;
            try {
                await deleteDoc(doc(db, "classes", id));
                showNotification('🗑️ Jadual kelas dipadam', 'info');
                await loadClassData();
                renderClassGrid();
            } catch (error) {
                console.error('Error deleting class:', error);
                showNotification('❌ Gagal memadam', 'error');
            }
        }

        classForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!currentUser) return;

            const data = {
                userId: currentUser.uid,
                day: classDay.value,
                time: classTime.value,
                subjectName: classSubject.value.trim(),
                subjectCode: classCode.value.trim(),
                lecturer: classLecturer.value.trim(),
                room: classRoom.value.trim(),
                color: classColor.value,
                notification: classNotif.checked,
                updatedAt: new Date().toISOString(),
                type: 'class' // Untuk bezakan dengan schedule
            };

            try {
                if (editingClassId) {
                    await updateDoc(doc(db, "classes", editingClassId), data);
                    showNotification('✅ Jadual kelas dikemaskini!', 'success');
                } else {
                    await addDoc(collection(db, "classes"), {
                        ...data,
                        createdAt: new Date().toISOString()
                    });
                    showNotification('✅ Jadual kelas ditambah!', 'success');
                }

                classModal.classList.remove('show');
                await loadClassData();
                renderClassGrid();

                // Auto-add to schedule for current week
                await autoAddToSchedule(data);

                if (data.notification) {
                    sendPushNotification(data);
                }

            } catch (error) {
                console.error('Error saving class:', error);
                showNotification('❌ Gagal menyimpan', 'error');
            }
        });

        // ===== AUTO ADD TO SCHEDULE =====
        async function autoAddToSchedule(classData) {
            if (!currentUser) return;
            const weekDates = getWeekDates(currentWeekOffset);
            const date = weekDates[classData.day];
            const dateStr = formatDate(date);

            const key = `${dateStr}-${classData.day}-${classData.time}`;

            // Check if already exists
            if (scheduleData[key]) return;

            try {
                await addDoc(collection(db, "schedules"), {
                    userId: currentUser.uid,
                    day: classData.day,
                    date: dateStr,
                    time: classData.time,
                    subjectName: classData.subjectName,
                    subjectCode: classData.subjectCode,
                    lecturer: classData.lecturer,
                    room: classData.room,
                    color: classData.color,
                    notification: classData.notification,
                    type: 'class',
                    createdAt: new Date().toISOString()
                });
                await loadScheduleData();
                renderScheduleGrid();
            } catch (error) {
                console.error('Error auto-adding to schedule:', error);
            }
        }

        // ===== SCHEDULE CRUD =====
        function openScheduleModal(day, time, date, editData = null) {
            scheduleDay.value = day;
            scheduleDate.value = formatDate(date);
            scheduleTime.value = time;
            if (editData) {
                scheduleModalTitle.textContent = '✏️ Edit Jadual Perancangan';
                scheduleSubject.value = editData.subjectName || '';
                scheduleCode.value = editData.subjectCode || '';
                scheduleLecturer.value = editData.lecturer || '';
                scheduleRoom.value = editData.room || '';
                scheduleColor.value = editData.color || '#667eea';
                scheduleNotif.checked = editData.notification || false;
                editingScheduleId = editData.id;
                scheduleDelete.style.display = 'inline-block';
            } else {
                scheduleModalTitle.textContent = '➕ Tambah Jadual Perancangan';
                scheduleForm.reset();
                scheduleColor.value = '#667eea';
                scheduleNotif.checked = false;
                editingScheduleId = null;
                scheduleDelete.style.display = 'none';
            }
            scheduleModal.classList.add('show');
            scheduleSubject.focus();
        }

        function editSchedule(id) {
            const key = Object.keys(scheduleData).find(k => scheduleData[k].id === id);
            if (key) {
                const data = scheduleData[key];
                const dateParts = data.date.split('/');
                const date = new Date(parseInt(dateParts[2]), parseInt(dateParts[1]) - 1, parseInt(dateParts[0]));
                openScheduleModal(data.day, data.time, date, data);
            }
        }

        async function deleteSchedule(id) {
            if (!confirm('Padam jadual perancangan ini?')) return;
            try {
                await deleteDoc(doc(db, "schedules", id));
                showNotification('🗑️ Jadual perancangan dipadam', 'info');
                await loadScheduleData();
                renderScheduleGrid();
            } catch (error) {
                console.error('Error deleting schedule:', error);
                showNotification('❌ Gagal memadam', 'error');
            }
        }

        scheduleForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!currentUser) return;

            const data = {
                userId: currentUser.uid,
                day: scheduleDay.value,
                date: scheduleDate.value,
                time: scheduleTime.value,
                subjectName: scheduleSubject.value.trim(),
                subjectCode: scheduleCode.value.trim(),
                lecturer: scheduleLecturer.value.trim(),
                room: scheduleRoom.value.trim(),
                color: scheduleColor.value,
                notification: scheduleNotif.checked,
                type: 'schedule',
                updatedAt: new Date().toISOString()
            };

            try {
                if (editingScheduleId) {
                    await updateDoc(doc(db, "schedules", editingScheduleId), data);
                    showNotification('✅ Jadual perancangan dikemaskini!', 'success');
                } else {
                    await addDoc(collection(db, "schedules"), {
                        ...data,
                        createdAt: new Date().toISOString()
                    });
                    showNotification('✅ Jadual perancangan ditambah!', 'success');
                }

                scheduleModal.classList.remove('show');
                await loadScheduleData();
                renderScheduleGrid();

                if (data.notification) {
                    sendPushNotification(data);
                }

            } catch (error) {
                console.error('Error saving schedule:', error);
                showNotification('❌ Gagal menyimpan', 'error');
            }
        });

        // ===== PUSH NOTIFICATION =====
        function sendPushNotification(data) {
            if (!("Notification" in window)) {
                showNotification('⚠️ Browser tidak support notification', 'error');
                return;
            }

            if (Notification.permission === "granted") {
                new Notification('📚 MYPOLY - Peringatan Kelas', {
                    body: `🕐 ${formatTimeDisplay(data.time)}\n📖 ${data.subjectName} (${data.subjectCode})\n👨‍🏫 ${data.lecturer}\n🏫 ${data.room}`,
                    icon: 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQJPPtvSjk6_fnQby9h0pJi3dMLhp-x1BHV2g&s'
                });
            } else if (Notification.permission !== "denied") {
                Notification.requestPermission().then(permission => {
                    if (permission === "granted") {
                        sendPushNotification(data);
                    }
                });
            }
        }

        // ===== SHOW NOTIFICATION =====
        function showNotification(message, type = 'info') {
            const notification = document.createElement('div');
            notification.className = `notification ${type}`;
            notification.textContent = message;
            document.body.appendChild(notification);
            setTimeout(() => notification.classList.add('show'), 100);
            setTimeout(() => {
                notification.classList.remove('show');
                setTimeout(() => notification.remove(), 300);
            }, 3000);
        }

        // ===== WEEK NAVIGATION =====
        function updateWeekDisplay() {
            const weekDates = getWeekDates(currentWeekOffset);
            const start = weekDates['Isnin'];
            const end = weekDates['Ahad'];
            const options = { day: 'numeric', month: 'short', year: 'numeric' };
            weekRange.textContent = `${start.toLocaleDateString('ms-MY', options)} - ${end.toLocaleDateString('ms-MY', options)}`;
        }

        prevWeekBtn.addEventListener('click', () => {
            currentWeekOffset--;
            renderScheduleGrid();
            updateWeekDisplay();
        });

        nextWeekBtn.addEventListener('click', () => {
            currentWeekOffset++;
            renderScheduleGrid();
            updateWeekDisplay();
        });

        // ===== CLOSE MODALS =====
        function closeClassModal() { classModal.classList.remove('show'); }
        classClose.addEventListener('click', closeClassModal);
        classCancel.addEventListener('click', closeClassModal);
        classModal.addEventListener('click', (e) => { if (e.target === classModal) closeClassModal(); });

        function closeScheduleModal() { scheduleModal.classList.remove('show'); }
        scheduleClose.addEventListener('click', closeScheduleModal);
        scheduleCancel.addEventListener('click', closeScheduleModal);
        scheduleModal.addEventListener('click', (e) => { if (e.target === scheduleModal) closeScheduleModal(); });

        // ===== ADD BUTTONS =====
        addClassBtn.addEventListener('click', () => openClassModal('Isnin', '08:00'));
        addScheduleBtn.addEventListener('click', () => {
            const weekDates = getWeekDates(currentWeekOffset);
            openScheduleModal('Isnin', '08:00', weekDates['Isnin']);
        });

        // ===== KEYBOARD SHORTCUTS =====
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeClassModal();
                closeScheduleModal();
            }
        });

        // ===== CHECK NOTIFICATIONS EVERY MINUTE =====
        setInterval(() => {
            const now = new Date();
            const currentTime = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
            const dayMap = ['Ahad', 'Isnin', 'Selasa', 'Rabu', 'Khamis', 'Jumaat', 'Sabtu'];
            const currentDay = dayMap[now.getDay()];
            const dateStr = formatDate(now);

            Object.values(scheduleData).forEach(data => {
                if (data.day === currentDay &&
                    data.date === dateStr &&
                    data.time === currentTime &&
                    data.notification) {
                    sendPushNotification(data);
                }
            });
        }, 60000);

        // ===== INIT =====
        if ("Notification" in window && Notification.permission === "default") {
            Notification.requestPermission();
        }

        window.db = db;
        window.auth = auth;

    </script>

    <style>
        /* ===== RESET & BASE ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0a1a;
            color: #ffffff;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ===== NOTIFICATION ===== */
        .notification {
            position: fixed;
            top: 20px;
            right: -400px;
            padding: 16px 24px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #fff;
            font-size: 14px;
            font-weight: 500;
            z-index: 9999;

        /* ===== GRID ===== */

            gap: 2px;

        /* Class grid: 8 columns (time + 5 days) */

        #classGrid .grid-row {
            grid-template-columns: 80px repeat(5, 1fr);

        }

        /* ===== SCHEDULE ITEM ===== */

            height: 100%;

            padding: 6px 8px;
            position: relative;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;

        @keyframes slideIn {

                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }

        .schedule-item:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
        }
        .schedule-item .subject-code {

            font-weight: 700;
            color: rgba(255, 255, 255, 0.7);
            letter-spacing: 0.5px;
        }
        .schedule-item .subject-name {
            font-size: 12px;
            font-weight: 600;
            color: #ffffff;
            line-height: 1.2;
        }
        .schedule-item .lecturer-name {

            color: rgba(255, 255, 255, 0.6);
        }
        .schedule-item .room-number {

            color: rgba(255, 255, 255, 0.5);

            right: 4px;

            color: rgba(255, 255, 255, 0.5);

            font-size: 10px;
            padding: 1px 6px;
            transition: all 0.3s ease;
            opacity: 0;

        .schedule-item:hover .delete-slot {

        .schedule-item .delete-slot:hover {

            color: #ffffff;

        /* ===== BADGE UNTUK JADUAL KELAS ===== */
        .class-badge {

        .modal-overlay {

            left: 0;

        .modal-box {

            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        .modal-box .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
        .modal-box .modal-header h2 {
            font-size: 22px;
            font-weight: 700;
        }
        .modal-box .modal-header .close-btn {
            background: rgba(255, 255, 255, 0.05);
            border: none;
            color: rgba(255, 255, 255, 0.5);
            font-size: 24px;

            padding: 4px 12px;
            border-radius: 8px;

            font-weight: 600;
            margin-bottom: 4px;
            letter-spacing: 0.5px;
        }
        .modal-box .form-group input,
        .modal-box .form-group select {
            width: 100%;
            padding: 10px 14px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.06);
            border-radius: 10px;
            color: #ffffff;
            font-size: 14px;
            transition: all 0.3s ease;

        }
        .modal-box .form-group input[type="color"] {
            padding: 4px;
            height: 44px;
            cursor: pointer;
        }
        .modal-box .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .modal-box .form-check {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 0;
        }
        .modal-box .form-check input[type="checkbox"] {
            width: 20px;
            height: 20px;
            accent-color: #667eea;
            cursor: pointer;
        }
        .modal-box .form-check label {
            color: rgba(255, 255, 255, 0.7);
            font-size: 13px;
            cursor: pointer;
        }
        .modal-box .modal-actions {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }
        .modal-box .modal-actions button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .modal-box .modal-actions .btn-save {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #ffffff;
        }
        .modal-box .modal-actions .btn-save:hover {

        }
        .modal-box .modal-actions .btn-cancel {
            background: rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.5);
        }
        .modal-box .modal-actions .btn-cancel:hover {
            background: rgba(255, 255, 255, 0.1);
        }
        .modal-box .modal-actions .btn-delete {
            background: rgba(255, 71, 87, 0.15);
            color: #ff4757;
            border: 1px solid rgba(255, 71, 87, 0.2);
            display: none;
        }
        .modal-box .modal-actions .btn-delete:hover {
            background: rgba(255, 71, 87, 0.25);
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 1200px) {
            .main-container {
                padding: 16px;

            #classGrid .grid-header,
            #classGrid .grid-row {
                grid-template-columns: 60px repeat(5, 1fr);
            }
            #scheduleGrid .grid-header,
            #scheduleGrid .grid-row {
                grid-template-columns: 60px repeat(7, 1fr);
            }
            .schedule-wrapper {
                overflow-x: auto;
            }
        }

        @media (max-width: 768px) {
            .navbar {
                padding: 10px 16px;
                flex-wrap: wrap;
                gap: 8px;
            }
            .section-header h2 {
                font-size: 18px;
            }
            .week-nav .week-range {
                min-width: 140px;
                font-size: 12px;
            }
            .modal-box {
                padding: 24px;
                margin: 10px;
            }
            .modal-box .form-row {
                grid-template-columns: 1fr;
            }
            #classGrid .grid-header,
            #classGrid .grid-row {
                grid-template-columns: 50px repeat(5, 1fr);
                min-width: 500px;
            }
            #scheduleGrid .grid-header,
            #scheduleGrid .grid-row {

                min-width: 600px;
            }
            .grid-cell {
                min-height: 40px;

            .schedule-item .subject-code,

            }
            .day-header .day-name {
                font-size: 11px;
            }
            .day-header .day-date {
                font-size: 9px;
            }
        }

        @media (max-width: 480px) {
            #classGrid .grid-header,
            #classGrid .grid-row {
                min-width: 400px;
            }
            #scheduleGrid .grid-header,
            #scheduleGrid .grid-row {
                min-width: 500px;
            }
            .grid-cell {
                min-height: 35px;
            }
            .schedule-item {
                padding: 3px 4px;
            }
            .schedule-item .subject-name {
                font-size: 9px;
            }
            .schedule-item .subject-code,
            .schedule-item .lecturer-name,
            .schedule-item .room-number {
                display: none;
            }
        }
    </style>
</head>

                    <div class="form-row">
                        <div class="form-group">
                            <label>🎨 Warna</label>
                            <input type="color" id="scheduleColor" value="#667eea" />
                        </div>
                        <div class="form-group">
                            <label>&nbsp;</label>
                            <div class="form-check">
                                <input type="checkbox" id="scheduleNotif" />
                                <label for="scheduleNotif">🔔 Hantar notifikasi</label>
                            </div>
                        </div>
                    </div>
                    <div class="modal-actions">
                        <button type="button" class="btn-delete" id="scheduleDelete">🗑️ Padam</button>
                        <button type="button" class="btn-cancel" id="scheduleCancel">Batal</button>
                        <button type="submit" class="btn-save" id="scheduleSubmit">💾 Simpan</button>
                    </div>
                </form>
            </div>
        </div>

    </div>

    <script>
        // ===== POPULATE TIME DROPDOWNS =====
        function populateTimeSelects() {
            // Class times: 7:30 AM - 6:00 PM
            const classTimes = [];
            for (let h = 7; h < 18; h++) {
                for (let m = 0; m < 60; m += 30) {
                    const hour = h < 10 ? `0${h}` : `${h}`;
                    const min = m === 0 ? '00' : '30';
                    classTimes.push(`${hour}:${min}`);
                }
            }

            const classTimeSelect = document.getElementById('classTime');
            classTimes.forEach(time => {
                const option = document.createElement('option');
                option.value = time;
                option.textContent = formatTimeDisplay(time);
                classTimeSelect.appendChild(option);
            });

            // Schedule times: 24 hours
            const scheduleTimes = [];
            for (let h = 0; h < 24; h++) {
                for (let m = 0; m < 60; m += 30) {
                    const hour = h < 10 ? `0${h}` : `${h}`;
                    const min = m === 0 ? '00' : '30';
                    scheduleTimes.push(`${hour}:${min}`);
                }
            }

            const scheduleTimeSelect = document.getElementById('scheduleTime');
            scheduleTimes.forEach(time => {
                const option = document.createElement('option');
                option.value = time;
                option.textContent = formatTimeDisplay(time);
                scheduleTimeSelect.appendChild(option);
            });
        }

        function formatTimeDisplay(time) {
            const [h, m] = time.split(':');
            const hour = parseInt(h);
            if (hour === 0) return '12:00 AM';
            if (hour < 12) return `${hour}:${m} AM`;
            if (hour === 12) return `12:${m} PM`;
            return `${hour - 12}:${m} PM`;
        }

        populateTimeSelects();

        // Make functions available globally for modal
        window.openClassModal = function(day, time, editData) {
            const modal = document.getElementById('classModal');
            document.getElementById('classDay').value = day;
            document.getElementById('classTime').value = time;
            if (editData) {
                document.getElementById('classModalTitle').textContent = '✏️ Edit Jadual Kelas';
                document.getElementById('classSubject').value = editData.subjectName || '';
                document.getElementById('classCode').value = editData.subjectCode || '';
                document.getElementById('classLecturer').value = editData.lecturer || '';
                document.getElementById('classRoom').value = editData.room || '';
                document.getElementById('classColor').value = editData.color || '#667eea';
                document.getElementById('classNotif').checked = editData.notification || false;
                document.getElementById('classDelete').style.display = 'inline-block';
                window.editingClassId = editData.id;
            } else {
                document.getElementById('classModalTitle').textContent = '➕ Tambah Jadual Kelas';
                document.getElementById('classForm').reset();
                document.getElementById('classColor').value = '#667eea';
                document.getElementById('classNotif').checked = false;
                document.getElementById('classDelete').style.display = 'none';
                window.editingClassId = null;
            }
            modal.classList.add('show');
            document.getElementById('classSubject').focus();
        };

        window.openScheduleModal = function(day, time, date, editData) {
            const modal = document.getElementById('scheduleModal');
            document.getElementById('scheduleDay').value = day;
            document.getElementById('scheduleTime').value = time;
            document.getElementById('scheduleDate').value = formatDateDisplay(date);

            if (editData) {
                document.getElementById('scheduleModalTitle').textContent = '✏️ Edit Jadual Perancangan';
                document.getElementById('scheduleSubject').value = editData.subjectName || '';
                document.getElementById('scheduleCode').value = editData.subjectCode || '';
                document.getElementById('scheduleLecturer').value = editData.lecturer || '';
                document.getElementById('scheduleRoom').value = editData.room || '';
                document.getElementById('scheduleColor').value = editData.color || '#667eea';
                document.getElementById('scheduleNotif').checked = editData.notification || false;
                document.getElementById('scheduleDelete').style.display = 'inline-block';
                window.editingScheduleId = editData.id;
            } else {
                document.getElementById('scheduleModalTitle').textContent = '➕ Tambah Jadual Perancangan';
                document.getElementById('scheduleForm').reset();
                document.getElementById('scheduleColor').value = '#667eea';
                document.getElementById('scheduleNotif').checked = false;
                document.getElementById('scheduleDelete').style.display = 'none';
                window.editingScheduleId = null;
            }
            modal.classList.add('show');
            document.getElementById('scheduleSubject').focus();
        };

        function formatDateDisplay(date) {
            if (!date) return '';
            if (typeof date === 'string') return date;
            return `${date.getDate()}/${date.getMonth() + 1}/${date.getFullYear()}`;
        }
    </script>

</body>
</html>
